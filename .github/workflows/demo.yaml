name: CI and Docker

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

permissions:
  contents: read

env:
  IMAGE_NAME: phuongdungphan/phuong-dung-cv

jobs:
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:build-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    env:
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DevOps Classroom
        if: env.DEPLOY_URL != ''
        run: |
          REPO="${IMAGE_NAME}"
          CONTAINER_PORT=8080
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${DEPLOY_URL}?repo=${REPO}&tag=latest&slot=4&container_port=${CONTAINER_PORT}&strict_container_port=1")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy failed. See response below."
            echo "::group::Deploy response"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy succeeded."
          echo "::group::Deploy response"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
